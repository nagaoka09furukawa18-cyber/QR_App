<script>
/**
 * js_logic.html: 通信ロジック
 */
console.log("LOG: js_logic.html has been loaded.");

async function fetchMaster() {
  console.log("LOG: fetchMaster() started.");
  try {
    const res = await fetch(`${GAS_URL}?method=getMasters`);
    const data = await res.json();
    master.existingNos = data.existingNos || {};
    masterProcs = data.processes || [];
    
    if (typeof initUI === 'function') {
      initUI();
      updateCockpit();
      updateStatusList();
    }
    
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('main-order-no').focus();
  } catch (e) {
    console.error("Fetch error:", e);
    document.getElementById('loading-screen').innerHTML = "通信エラー: スクリプトの実行権限を確認してください";
  }
}

// その他の関数 (handleOrderSearch, saveAndProcessなど) も、
// 以前お送りしたものをこの <script> タグの中に続けて貼り付けてください
</script>
