<script>
/**
 * 通信および入力判定ロジック
 */

async function fetchMaster() {
  try {
    const res = await fetch(`${GAS_URL}?method=getMasters`);
    const data = await res.json();
    master.existingNos = data.existingNos || {};
    masterProcs = data.processes || [];
    initUI();
    updateCockpit();
    updateStatusList(); // リストも初期読込
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('main-order-no').focus();
  } catch (e) { document.getElementById('loading-screen').innerHTML = "通信エラー"; }
}

async function handleOrderSearch(val) {
  if (!val) return;
  clearPreview(); updateQR(val);
  if (master.existingNos[val]) {
    try {
      const res = await fetch(`${GAS_URL}?method=getExistingOrder&range=${JSON.stringify(master.existingNos[val])}`);
      const rows = await res.json();
      rows.forEach(row => {
        const idx = masterProcs.indexOf(row[0]);
        if (idx !== -1) {
          editData[idx] = { name: row[0], order: row[1], st: row[2], limit: row[3] ? row[3].toString().split('T')[0] : "" };
          updatePreviewCell(idx);
        }
      });
      updateCockpit();
    } catch (err) { log("読込エラー"); }
  }
  document.getElementById('inp-order').focus();
}

async function saveAndProcess(statusText) {
  const orderInput = document.getElementById('main-order-no');
  const orderNo = orderInput.value.trim();
  if (!orderNo) return alert("手配No未入力");

  let payload = [];
  masterProcs.forEach((name, i) => {
    const d = editData[i];
    if (d.order || d.st || d.limit) payload.push([name, d.order, d.st, d.limit]);
  });

  setStatus("通信中...", "status-wait");

  try {
    const saveParams = new URLSearchParams({
      method: 'saveOnly',
      orderNo: orderNo,
      status: '保存済', 
      allData: JSON.stringify(payload)
    });
    const response = await fetch(`${GAS_URL}?${saveParams.toString()}`);
    const result = await response.json();
    if (result.newIndex) master.existingNos = result.newIndex;

    if (statusText === '発行済') {
      window.print(); 
      const updateUrl = `${GAS_URL}?method=updateStatusOnly&orderNo=${encodeURIComponent(orderNo)}&status=発行済`;
      await fetch(updateUrl); 
    }

    setStatus("完了", "status-ok");
    resetFullForm();
    updateStatusList(); // リストを最新にする

  } catch (err) {
    setStatus("通信エラー", "status-wait");
  }
}

function resetFullForm() {
  document.getElementById('main-order-no').value = "";
  clearPreview(); updateQR(""); currentIdx = 0;
  updateCockpit();
  document.getElementById('main-order-no').focus();
}

function clearPreview() {
  masterProcs.forEach((p, i) => { editData[i] = { name: p, order: "", st: "", limit: "" }; updatePreviewCell(i); });
}

function sync() {
  const d = editData[currentIdx];
  d.order = document.getElementById('inp-order').value;
  d.st = document.getElementById('inp-st').value;
  d.limit = document.getElementById('inp-limit').value;
  updatePreviewCell(currentIdx);
}

function moveProc(step) {
  currentIdx = (currentIdx + step + masterProcs.length) % masterProcs.length;
  updateCockpit();
}

function handleEnter(e, nextId) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (nextId === 'SAVE') { saveAndProcess('発行済'); return; }
    const nextEl = document.getElementById(nextId);
    if (nextEl) {
      nextEl.focus();
      if (nextId === 'inp-limit') nextEl.showPicker();
    }
  }
}

function checkLimitSequence(el) { /* ...既存のまま... */ }
</script>
