<script>
/**
 * UI表示に関連する関数群
 */

function initUI() {
  const trH = document.getElementById('tr-head'), trO = document.getElementById('tr-order'), trS = document.getElementById('tr-st'), trL = document.getElementById('tr-limit');
  trH.innerHTML = '<th>工程</th>'; trO.innerHTML = '<th>指示順</th>'; trS.innerHTML = '<th>ST</th>'; trL.innerHTML = '<th>納期</th>';
  masterProcs.forEach((proc, i) => {
    trH.innerHTML += `<th>${proc}</th>`;
    trO.innerHTML += `<td id="d-o-${i}"></td>`;
    trS.innerHTML += `<td id="d-s-${i}"></td>`;
    trL.innerHTML += `<td id="d-l-${i}"></td>`;
    editData[i] = { name: proc, order: "", st: "", limit: "" };
  });
}

function updateCockpit() {
  const d = editData[currentIdx];
  document.getElementById('target-proc-name').innerText = d.name;
  document.getElementById('inp-order').value = d.order;
  document.getElementById('inp-st').value = d.st;
  document.getElementById('inp-limit').value = d.limit;
  setHighlight('o'); 
}

function setHighlight(type) {
  document.querySelectorAll('.preview-table td').forEach(td => td.classList.remove('active-cell'));
  const cell = document.getElementById(`d-${type}-${currentIdx}`);
  if (cell) cell.classList.add('active-cell');
}

function updatePreviewCell(idx) {
  const d = editData[idx];
  document.getElementById(`d-o-${idx}`).innerText = d.order;
  document.getElementById(`d-s-${idx}`).innerText = d.st;
  document.getElementById(`d-l-${idx}`).innerText = d.limit ? d.limit.split('-').slice(1).join('/') : "";
}

function updateQR(val) {
  const canvas = document.getElementById('qrcode');
  if (val) {
    QRCode.toCanvas(canvas, val, { width: 110, margin: 2 });
    document.getElementById('display-no-val').innerText = val;
  } else {
    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('display-no-val').innerText = "---";
  }
}

function setStatus(txt, cls) {
  const s = document.getElementById('status-display');
  if(s) { s.innerText = txt; s.className = cls; }
}

function log(m) { 
  const div = document.getElementById('debug-log');
  if(div) { div.innerHTML += `<div>> ${m}</div>`; div.scrollTop = div.scrollHeight; }
}

/**
 * 発行ステータスリストの更新
 */
async function updateStatusList() {
  const tbody = document.getElementById('status-table-body');
  try {
    const resp = await fetch(`${GAS_URL}?method=getOrdersWithStatus`);
    const orders = await resp.json();
    tbody.innerHTML = '';
    orders.forEach(item => {
      const tr = document.createElement('tr');
      if (item.status === '保存済') tr.classList.add('row-unissued');
      tr.innerHTML = `<td>${item.no}</td><td>${item.status}</td>`;
      tr.onclick = () => loadOrderQuick(item.no);
      tbody.appendChild(tr);
    });
  } catch (e) { log("リスト更新失敗"); }
}

function loadOrderQuick(no) {
  const input = document.getElementById('main-order-no');
  input.value = no;
  const event = new KeyboardEvent('keydown', { key: 'Enter' });
  input.dispatchEvent(event); // Enterイベントを擬似的に発生させて検索実行
  window.scrollTo(0,0);
}
</script>
