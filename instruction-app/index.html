<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 10px; background: #e9ecef; }
    
    /* ローディング画面 */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; display: flex; justify-content: center; align-items: center;
      z-index: 2000; font-size: 20px; font-weight: bold;
    }

    .top-bar { display: flex; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; }
    .top-title { font-weight: bold; }
    .top-date { margin-left: auto; font-size: 14px; }

    #preview-container { 
      background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 15px; 
      width: calc(100% - 42px); box-sizing: border-box; overflow-x: auto;
    }
    .preview-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .order-input-group { display: flex; align-items: center; font-size: 30px; font-weight: bold; }
    
    /* 手配No入力：確定前は黄色背景で強調 */
    #main-order-no {
      font-size: 30px; font-weight: bold; border: 2px solid #007bff; border-radius: 6px;
      padding: 2px 10px; width: 300px; margin-left: 10px; background: #fffde7;
    }
    #main-order-no.fixed { background: #e8f0fe; border-color: #28a745; }

    table.preview-table { border-collapse: collapse; width: 100% !important; min-width: 800px; table-layout: fixed; margin-top: 15px; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 10px; text-align: center; height: 35px; word-break: break-all; }
    .preview-table th { background: #f2f2f2; font-size: 9px; }
    #qr-area canvas { width: 85px !important; height: 85px !important; }

    .disabled-overlay { opacity: 0.3; pointer-events: none; filter: grayscale(1); transition: all 0.2s ease; }
    #button-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
    .proc-btn { padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid #adb5bd; background: #fff; border-radius: 4px; }
    .proc-btn.active { background: #007bff; color: white; border-color: #0056b3; }

    .action-area { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; }
    #input-card { background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #007bff; width: 450px; }
    .card-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .nav-btn { font-size: 24px; cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
    .current-proc-title { font-size: 22px; font-weight: bold; color: #007bff; min-width: 140px; text-align: center; }

    .vertical-inputs { display: flex; flex-direction: column; gap: 12px; }
    .input-item { display: flex; align-items: center; width: 100%; }
    .input-item label { font-size: 14px; font-weight: bold; width: 80px; flex-shrink: 0; }
    .input-item input, .input-item select { font-size: 18px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }

    .save-btn { padding: 20px 40px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; }
    #archive-btn-float { position: fixed; bottom: 20px; right: 20px; background: #6c757d; color: white; border: none; border-radius: 50px; padding: 10px 25px; cursor: pointer; font-size: 14px; }

    @media print {
      @page { size: A4 landscape; margin: 5mm; }
      html, body { width: 297mm; height: 210mm; background: white !important; filter: grayscale(100%); }
      .top-bar, #button-grid, .action-area, #archive-btn-float, #loading-screen { display: none !important; }
      #preview-container { border: none; padding: 0; margin: 0; width: 100% !important; transform: scale(0.98); transform-origin: top left; }
      #main-order-no { border: none; background: none; padding: 0; width: auto; }
      .preview-table th { background: #eee !important; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div id="loading-screen">システム起動中...</div>

<div class="top-bar">
  <span class="top-title">指示書作成コックピット v6.66</span>
  <div class="top-date">作成日: <span id="disp-date"></span></div>
</div>

<div id="preview-container">
  <div class="preview-header">
    <div class="order-input-group">
      手配No : <input type="text" id="main-order-no" placeholder="番号入力後Enterで確定">
    </div>
    <div id="qr-area" style="margin-left: auto;"><canvas id="qrcode"></canvas></div>
  </div>
  <table class="preview-table" id="main-table">
    <thead id="thr-proc"><tr><th>工程</th></tr></thead>
    <tbody>
      <tr id="tr-order"><th>指示順</th></tr>
      <tr id="tr-st"><th>ST</th></tr>
      <tr id="tr-limit"><th>納期</th></tr>
    </tbody>
  </table>
</div>

<div id="main-controls" class="disabled-overlay">
  <div id="button-grid"></div>
  <div class="action-area">
    <div id="input-card">
      <div class="card-header">
        <div class="nav-btn" onclick="navProc(-1)">◁</div>
        <div id="current-proc-display" class="current-proc-title">未選択</div>
        <div id="next-btn-focus" class="nav-btn" onclick="navProc(1)" tabindex="0">▷</div>
      </div>
      <div class="vertical-inputs">
        <div id="extra-area" style="display:none;" class="input-item">
          <label>工程選択</label>
          <select id="extra-proc-select" onchange="handleExtraSelect()"></select>
        </div>
        <div class="input-item"><label>指示順</label><input type="number" id="inp-order" oninput="sync()" onkeydown="enterNext(event, 'inp-st')" onchange="checkDuplicate(this)"></div>
        <div class="input-item"><label>ST</label><input type="number" id="inp-st" oninput="sync()" onkeydown="enterNext(event, 'inp-limit')"></div>
        <div class="input-item"><label>納期</label><input type="date" id="inp-limit" oninput="sync()" onclick="this.showPicker()" onkeydown="enterNext(event, 'next-btn-focus')"></div>
      </div>
    </div>
    <button class="save-btn" onclick="saveAndPrint()">保存 ＆ 指示書発行</button>
  </div>
</div>

<button id="archive-btn-float" onclick="runArchive()">アーカイブ実行</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ8KW8Z8bPXIu-piVjydNI-na8gBygz1UVCrvGjFRdpJ-NPoj2fk14bzkv62AY4r8T/exec";
let master = { processes: [] };
let editData = {}; 
let currentProcIdx = -1;

window.onload = () => {
  document.getElementById('disp-date').innerText = new Date().toLocaleDateString();
  fetchMaster(); 
};

async function fetchMaster() {
  try {
    const res = await fetch(`${GAS_URL}?method=getMasters`);
    master = await res.json();
    initUI();
    document.getElementById('loading-screen').style.display = 'none'; // 準備ができたら隠す
    document.getElementById('main-order-no').focus();
  } catch (err) { console.error("Fetch Error:", err); }
}

// 手配NoのEnter確定と存在チェック
document.getElementById('main-order-no').addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (!val) return;

    // 確定状態の演出
    this.classList.add('fixed');
    this.blur();
    
    // QR生成
    try { QRCode.toCanvas(document.getElementById('qrcode'), val, { width: 85, margin: 2 }); } catch(err){}

    // すでに存在するかGAS側に問い合わせ
    document.getElementById('loading-screen').innerText = "データ確認中...";
    document.getElementById('loading-screen').style.display = 'flex';
    
    try {
      const res = await fetch(`${GAS_URL}?method=getExistingOrder&orderNo=${encodeURIComponent(val)}`);
      const existingData = await res.json();
      
      if (existingData && existingData.length > 0) {
        // 既存データがある場合は反映
        restoreData(existingData);
      } else {
        // 新規の場合はクリア（念のため）
        clearAllInputs();
      }
      
      document.getElementById('main-controls').classList.remove('disabled-overlay');
      if (currentProcIdx === -1) selectProc(0);
      
    } catch (err) {
      console.error("Check Error:", err);
    } finally {
      document.getElementById('loading-screen').style.display = 'none';
    }
  }
});

function initUI() {
  const thr = document.getElementById('thr-proc');
  const trO = document.getElementById('tr-order');
  const trS = document.getElementById('tr-st');
  const trL = document.getElementById('tr-limit');
  const btnGrid = document.getElementById('button-grid');
  const extraSelect = document.getElementById('extra-proc-select');
  
  thr.innerHTML = '<th>工程</th>'; 
  trO.innerHTML = '<th>指示順</th>';
  trS.innerHTML = '<th>ST</th>';
  trL.innerHTML = '<th>納期</th>';
  btnGrid.innerHTML = '';
  extraSelect.innerHTML = '<option value="">-- 工程選択 --</option>';

  master.processes.forEach((proc, i) => {
    thr.innerHTML += `<th>${proc}</th>`;
    trO.innerHTML += `<td id="d-o-${i}"></td>`;
    trS.innerHTML += `<td id="d-s-${i}"></td>`;
    trL.innerHTML += `<td id="d-l-${i}"></td>`;
    
    const btn = document.createElement('button');
    btn.className = 'proc-btn';
    btn.innerText = proc;
    btn.onclick = () => selectProc(i);
    btnGrid.appendChild(btn);
    
    editData[i] = { name: proc, order: "", st: "", limit: "" };
    if(!proc.includes("予備")){
      const opt = document.createElement('option');
      opt.value = proc; opt.innerText = proc;
      extraSelect.appendChild(opt);
    }
  });
}

// 既存データを画面に復元する
function restoreData(rows) {
  // 一旦全クリア
  clearAllInputs();
  
  rows.forEach(row => {
    const [procName, order, st, limit] = row;
    // masterのプロセス名と一致するインデックスを探す
    const idx = master.processes.indexOf(procName);
    
    if (idx !== -1) {
      editData[idx] = { 
        name: procName, 
        order: order || "", 
        st: st || "", 
        limit: limit ? limit.split('T')[0] : "" 
      };
      // プレビュー反映
      updatePreviewRow(idx);
    } else {
      // 予備工程などの場合、空いている予備枠を探して入れる
      const spareIdx = master.processes.findIndex((p, i) => p.includes("予備") && !editData[i].order && !editData[i].st);
      if (spareIdx !== -1) {
        editData[spareIdx] = { 
          name: procName, 
          order: order || "", 
          st: st || "", 
          limit: limit ? limit.split('T')[0] : "" 
        };
        document.getElementById('thr-proc').children[spareIdx + 1].innerText = procName;
        updatePreviewRow(spareIdx);
      }
    }
  });
}

function updatePreviewRow(idx) {
  const d = editData[idx];
  document.getElementById(`d-o-${idx}`).innerText = d.order;
  document.getElementById(`d-s-${idx}`).innerText = d.st;
  document.getElementById(`d-l-${idx}`).innerText = d.limit ? d.limit.split('-').slice(1).join('/') : "";
}

function clearAllInputs() {
  master.processes.forEach((proc, i) => {
    editData[i] = { name: proc, order: "", st: "", limit: "" };
    document.getElementById(`d-o-${i}`).innerText = "";
    document.getElementById(`d-s-${i}`).innerText = "";
    document.getElementById(`d-l-${i}`).innerText = "";
    document.getElementById('thr-proc').children[i+1].innerText = proc;
  });
}

function selectProc(index) {
  currentProcIdx = index;
  const originalName = master.processes[index];
  const isExtra = originalName.includes("予備");
  document.getElementById('current-proc-display').innerText = editData[index].name;
  document.getElementById('extra-area').style.display = isExtra ? "flex" : "none";
  document.querySelectorAll('.proc-btn').forEach(b => b.classList.remove('active'));
  if(document.getElementById('button-grid').children[index]) {
    document.getElementById('button-grid').children[index].classList.add('active');
  }
  const data = editData[index];
  document.getElementById('inp-order').value = data.order;
  document.getElementById('inp-st').value = data.st;
  document.getElementById('inp-limit').value = data.limit;
}

function sync() {
  if (currentProcIdx === -1) return;
  const o = document.getElementById('inp-order').value;
  const s = document.getElementById('inp-st').value;
  const l = document.getElementById('inp-limit').value;
  editData[currentProcIdx].order = o;
  editData[currentProcIdx].st = s;
  editData[currentProcIdx].limit = l;
  updatePreviewRow(currentProcIdx);
}

function handleExtraSelect() {
  const selectedName = document.getElementById('extra-proc-select').value;
  if (selectedName) {
    editData[currentProcIdx].name = selectedName;
    document.getElementById('current-proc-display').innerText = selectedName;
    document.getElementById('thr-proc').children[currentProcIdx + 1].innerText = selectedName;
  }
}

async function saveAndPrint() {
  const orderNo = document.getElementById('main-order-no').value.trim();
  if (!orderNo) return alert("手配Noを入力してください");
  let savePayload = [];
  Object.keys(editData).forEach(idx => {
    const d = editData[idx];
    if (d.order || d.st || d.limit) savePayload.push([d.name, d.order, d.st, d.limit]);
  });
  if (savePayload.length === 0) return alert("入力がありません");
  const res = await fetch(`${GAS_URL}?method=saveOnly&orderNo=${encodeURIComponent(orderNo)}&allData=${encodeURIComponent(JSON.stringify(savePayload))}`);
  const result = await res.json();
  if (result === "保存成功") window.print(); else alert(result);
}

function checkDuplicate(inputEl) {
  const val = inputEl.value; if (!val) return;
  for (let key in editData) {
    if (parseInt(key) !== currentProcIdx && editData[key].order === val) {
      alert(`指示順 ${val} は既に「${editData[key].name}」で使用されています。`);
      inputEl.value = ""; sync(); return;
    }
  }
}
function navProc(diff) { let next = currentProcIdx + diff; if (next >= 0 && next < master.processes.length) selectProc(next); }
function enterNext(e, nextId) { if (e.key === 'Enter') { e.preventDefault(); const nextEl = document.getElementById(nextId); if (nextEl) nextEl.focus(); } }
function runArchive() { if (confirm("完了案件をアーカイブしますか？")) google.script.run.checkAndArchiveCompletedOrders(); }
</script>
</body>
</html>
