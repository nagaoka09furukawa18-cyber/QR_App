<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    /* 既存のスタイルを継承しつつレイアウト調整 */
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 10px; background: #e9ecef; display: flex; flex-direction: column; height: 100vh; }
    .top-bar { display: flex; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; flex-shrink: 0; }
    
    #main-container { display: flex; gap: 15px; flex-grow: 1; overflow: hidden; }
    
    /* 左側パネル */
    #side-panel { width: 300px; background: white; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-direction: column; padding: 15px; }
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    #order-list-container { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; }
    .list-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
    .list-item:hover { background: #f0f7ff; }
    .status-badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-left: auto; }
    .status-unprinted { background: #ffeb3b; color: #856404; }
    .status-printed { background: #e0e0e0; color: #666; }

    /* 右側メイン */
    #content-area { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
    
    /* 既存パーツ */
    #preview-container { background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 15px; }
    .preview-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    table.preview-table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 15px; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 10px; text-align: center; height: 35px; }
    
    .action-area { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; margin-top: 15px; }
    #input-card { background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #007bff; width: 450px; }
    
    #inp-limit { position: relative; padding-left: 40px; }
    #inp-limit::-webkit-calendar-picker-indicator { position: absolute; left: 8px; }

    @media print {
      #side-panel, .top-bar, .action-area, #button-grid, #order-modal { display: none !important; }
      body { background: white; }
      #main-container { display: block; }
      #preview-container { border: none; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <strong>指示書 v6.2</strong>
    <span id="display-order-no" onclick="showModal()" style="margin-left:15px; color:#ffc107; cursor:pointer; text-decoration:underline;">手配Noを選択</span>
    <button onclick="runArchive()" style="margin-left:20px; font-size:11px;">完了案件整理</button>
    <div style="margin-left: auto;">作成日: <span id="disp-date"></span></div>
  </div>

  <div id="main-container">
    <div id="side-panel">
      <div class="list-header">
        <strong>保存済みリスト</strong>
        <label style="font-size:11px;"><input type="checkbox" id="unprinted-only" onchange="refreshOrderList()"> 未発行のみ</label>
      </div>
      <input type="text" id="search-box" placeholder="手配No検索..." oninput="filterList()" style="width:100%; padding:5px; margin-bottom:10px;">
      <div id="order-list-container">リスト読み込み中...</div>
      <button onclick="printSelected()" style="margin-top:10px; background:#28a745; color:white; border:none; padding:10px; cursor:pointer; font-weight:bold; border-radius:4px;">選択した指示書を一括発行</button>
    </div>

    <div id="content-area">
      <div id="preview-container">
        <div class="preview-header">
          <div id="huge-no-display" style="font-size:30px; font-weight:bold;">手配No：--------</div>
          <div id="qr-area"><canvas id="qrcode"></canvas></div>
        </div>
        <table class="preview-table">
          <thead><tr id="thr-proc"><th>工程</th></tr></thead>
          <tbody>
            <tr id="tr-order"><th>指示順</th></tr>
            <tr id="tr-st"><th>ST</th></tr>
            <tr id="tr-limit"><th>納期</th></tr>
          </tbody>
        </table>
      </div>

      <div id="button-grid" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;"></div>

      <div class="action-area">
        <div id="input-card">
          <div id="current-proc-display" style="text-align:center; font-weight:bold; color:#007bff; margin-bottom:10px;">工程を選択してください</div>
          <div id="extra-area" style="display:none; margin-bottom:10px;">
            <label>工程選択:</label> <select id="extra-proc-select" onchange="handleExtraSelect()"></select>
          </div>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div>指示順: <input type="number" id="inp-order" disabled oninput="sync()"></div>
            <div>ST: <input type="number" id="inp-st" disabled oninput="sync()"></div>
            <div>納期: <input type="date" id="inp-limit" disabled onclick="this.showPicker()" oninput="sync()"></div>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button class="save-btn" onclick="saveData('未発行')" style="padding:10px; background:#6c757d; color:white; border:none; cursor:pointer;">保存のみ（あとで印刷）</button>
          <button class="save-btn" onclick="saveAndPrint()" style="padding:20px; background:#007bff; color:white; border:none; cursor:pointer; font-weight:bold; font-size:18px;">保存 ＆ 指示書発行</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ8KW8Z8bPXIu-piVjydNI-na8gBygz1UVCrvGjFRdpJ-NPoj2fk14bzkv62AY4r8T/exec";
    let master = { processes: [] };
    let editData = {};
    let currentProcIdx = -1;

    window.onload = async () => {
      document.getElementById('disp-date').innerText = new Date().toLocaleDateString();
      const res = await fetch(`${GAS_URL}?method=getMasters`);
      master = await res.json();
      initUI();
      refreshOrderList();
    };

    // リストの取得と表示
    async function refreshOrderList() {
      const container = document.getElementById('order-list-container');
      const unprintedOnly = document.getElementById('unprinted-only').checked;
      
      const res = await fetch(`${GAS_URL}?method=getOrdersWithStatus`);
      const orders = await res.json(); // [{no: "...", status: "未発行"}, ...]
      
      container.innerHTML = "";
      orders.forEach(item => {
        if (unprintedOnly && item.status !== "未発行") return;
        
        const div = document.createElement('div');
        div.className = "list-item";
        div.onclick = () => loadByList(item.no);
        div.innerHTML = `
          <input type="checkbox" class="batch-select" value="${item.no}" onclick="event.stopPropagation()">
          <span style="margin-left:8px; font-weight:bold;">${item.no}</span>
          <span class="status-badge ${item.status === '未発行' ? 'status-unprinted' : 'status-printed'}">${item.status}</span>
        `;
        container.appendChild(div);
      });
    }

    async function loadByList(no) {
      document.getElementById('display-order-no').innerText = no;
      document.getElementById('huge-no-display').innerText = "手配No：" + no;
      QRCode.toCanvas(document.getElementById('qrcode'), no, { width: 85, margin: 2 });
      await loadExistingData(no);
    }

    // 保存処理
    async function saveData(status) {
      const orderNo = document.getElementById('display-order-no').innerText;
      if (orderNo === "手配Noを選択") return alert("手配Noを指定してください");

      let savePayload = [];
      Object.keys(editData).forEach(idx => {
        const d = editData[idx];
        if (d.order || d.st || d.limit) savePayload.push([d.name, d.order, d.st, d.limit]);
      });

      const url = `${GAS_URL}?method=saveWithStatus&orderNo=${encodeURIComponent(orderNo)}&status=${status}&allData=${encodeURIComponent(JSON.stringify(savePayload))}`;
      const res = await fetch(url);
      const result = await res.json();
      alert(result);
      refreshOrderList();
    }

    async function saveAndPrint() {
      // 1. 保存（ステータスを一旦「未発行」または「発行済」へ）
      await saveData('発行済');
      // 2. 印刷
      window.print();
    }

    // 一括印刷（選択されたNoを順次ロードして印刷ダイアログを出す）
    async function printSelected() {
      const selected = Array.from(document.querySelectorAll('.batch-select:checked')).map(cb => cb.value);
      if (selected.length === 0) return alert("案件を選択してください");
      
      for (const no of selected) {
        await loadByList(no);
        window.print();
        // 印刷後にステータス更新
        await fetch(`${GAS_URL}?method=updateStatusOnly&orderNo=${encodeURIComponent(no)}&status=発行済`);
      }
      refreshOrderList();
    }

    /* 以下、initUI, sync, loadExistingData などの基本関数は v6.1 を継承 */
  </script>
</body>
</html>
