<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 10px; background: #e9ecef; overflow-x: hidden; }
    
    /* 初期入力モーダル */
    #order-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .modal-content input { font-size: 32px; padding: 10px; width: 300px; text-align: center; border: 2px solid #007bff; border-radius: 8px; }
    
    /* メインヘッダー */
    .top-bar { display: flex; align-items: center; background: #343a40; color: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; }
    #display-order-no { font-size: 20px; font-weight: bold; color: #ffc107; cursor: pointer; text-decoration: underline; margin-left: 10px; }

    /* プレビューエリア（A4横） */
    #preview-container { 
      background: white; padding: 10px; border: 1px solid #ccc; position: relative;
      margin-bottom: 10px; min-height: 120px;
    }
    table.preview-table { border-collapse: collapse; width: calc(100% - 110px); table-layout: fixed; float: left; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 9px; text-align: center; height: 18px; overflow: hidden; }
    .preview-table th { background: #f2f2f2; }
    #qr-area { float: right; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }

    /* 工程選択ボタン */
    #button-grid { 
      display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 10px;
    }
    .proc-btn { padding: 6px 2px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #adb5bd; background: #fff; border-radius: 4px; white-space: nowrap; }
    .proc-btn.active { background: #007bff; color: white; border-color: #0056b3; }

    /* 固定入力カード（縦型） */
    #input-panel { 
      display: flex; background: #fff; padding: 15px; border-radius: 8px; border: 2px solid #007bff;
      align-items: center; justify-content: space-between;
    }
    .proc-title { font-size: 28px; font-weight: bold; color: #007bff; width: 150px; text-align: center; }
    .input-column { display: flex; flex-direction: column; gap: 8px; }
    .input-item { display: flex; align-items: center; justify-content: flex-end; }
    .input-item label { font-size: 13px; font-weight: bold; margin-right: 10px; width: 60px; text-align: right; }
    .input-item input { font-size: 18px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
    
    /* 入力幅の最適化 */
    #inp-order { width: 60px; }
    #inp-st { width: 80px; }
    #inp-limit { width: 160px; }

    @media print {
      .top-bar, #button-grid, #input-panel, #order-modal { display: none !important; }
      #preview-container { border: none; width: 100%; }
      table.preview-table { width: calc(100% - 120px); }
      @page { size: A4 landscape; margin: 5mm; }
    }
  </style>
</head>
<body>

  <div id="order-modal">
    <div class="modal-content">
      <h2 style="margin-top:0">手配Noを入力してください</h2>
      <input type="text" id="modal-order-no" placeholder="手配No" autofocus>
      <p style="color:#666; font-size:12px;">Enterキーで確定</p>
    </div>
  </div>

  <div class="top-bar">
    <strong>指示書作成 v5.1</strong>
    <span id="display-order-no" onclick="showModal()">---</span>
    <div style="margin-left: auto; font-size: 13px;">作成日: <span id="disp-date"></span></div>
  </div>

  <div id="preview-container" class="clearfix">
    <table class="preview-table" id="main-table">
      <thead><tr id="thr-proc"><th>工程</th></tr></thead>
      <tbody>
        <tr id="tr-order"><th>順</th></tr>
        <tr id="tr-st"><th>ST</th></tr>
        <tr id="tr-limit"><th>納期</th></tr>
      </tbody>
    </table>
    <div id="qr-area"><canvas id="qrcode"></canvas></div>
    <div style="clear:both;"></div>
  </div>

  <div id="button-grid"></div>

  <div id="input-panel">
    <div id="current-proc-display" class="proc-title">未選択</div>
    
    <div class="input-column">
      <div class="input-item">
        <label>指示順</label>
        <input type="number" id="inp-order" min="1" max="20" oninput="sync()">
      </div>
      <div class="input-item">
        <label>ST</label>
        <input type="number" id="inp-st" min="1" max="999" oninput="sync()">
      </div>
    </div>

    <div class="input-column">
      <div class="input-item">
        <label>納期</label>
        <input type="date" id="inp-limit" oninput="sync()">
      </div>
    </div>

    <button onclick="saveAndPrint()" style="padding:20px 40px; background:#28a745; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:18px;">保存＆印刷</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ8KW8Z8bPXIu-piVjydNI-na8gBygz1UVCrvGjFRdpJ-NPoj2fk14bzkv62AY4r8T/exec";
    let master = { processes: [] };
    let editData = {};
    let currentProc = "";

    // モーダル制御
    const modal = document.getElementById('order-modal');
    const modalInput = document.getElementById('modal-order-no');
    
    modalInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && modalInput.value.trim() !== "") {
        document.getElementById('display-order-no').innerText = modalInput.value;
        modal.style.display = 'none';
        updateQR();
      }
    });

    function showModal() {
      modal.style.display = 'flex';
      modalInput.focus();
    }

    window.onload = async () => {
      document.getElementById('disp-date').innerText = new Date().toLocaleDateString();
      const res = await fetch(`${GAS_URL}?method=getMasters`);
      master = await res.json();
      initUI();
    };

    function initUI() {
      const thr = document.getElementById('thr-proc');
      const trO = document.getElementById('tr-order');
      const trS = document.getElementById('tr-st');
      const trL = document.getElementById('tr-limit');
      const btnGrid = document.getElementById('button-grid');

      master.processes.forEach((proc, i) => {
        thr.innerHTML += `<th>${proc}</th>`;
        trO.innerHTML += `<td id="td-o-${i}"></td>`;
        trS.innerHTML += `<td id="td-s-${i}"></td>`;
        trL.innerHTML += `<td id="td-l-${i}"></td>`;

        const btn = document.createElement('button');
        btn.className = 'proc-btn';
        btn.innerText = proc;
        btn.onclick = () => selectProc(proc, i);
        btnGrid.appendChild(btn);
        editData[proc] = { order: "", st: "", limit: "" };
      });
    }

    function selectProc(proc, index) {
      currentProc = proc;
      document.getElementById('current-proc-display').innerText = proc;
      document.querySelectorAll('.proc-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('button-grid').children[index].classList.add('active');

      document.getElementById('inp-order').value = editData[proc].order;
      document.getElementById('inp-st').value = editData[proc].st;
      document.getElementById('inp-limit').value = editData[proc].limit;
      document.getElementById('inp-order').focus();
    }

    function sync() {
      if (!currentProc) return;
      const o = document.getElementById('inp-order').value;
      const s = document.getElementById('inp-st').value;
      const l = document.getElementById('inp-limit').value;
      editData[currentProc] = { order: o, st: s, limit: l };

      const idx = master.processes.indexOf(currentProc);
      document.getElementById(`td-o-${idx}`).innerText = o;
      document.getElementById(`td-s-${idx}`).innerText = s;
      document.getElementById(`td-l-${idx}`).innerText = l ? l.split('-').slice(1).join('/') : "";
    }

    function updateQR() {
      const no = document.getElementById('display-order-no').innerText;
      QRCode.toCanvas(document.getElementById('qrcode'), no, { width: 90, margin: 2 });
    }

    async function saveAndPrint() {
      const orderNo = document.getElementById('display-order-no').innerText;
      const createDate = new Date().toISOString().split('T')[0];
      let savePayload = [];
      master.processes.forEach(p => {
        if (editData[p].order || editData[p].st || editData[p].limit) {
          savePayload.push([p, editData[p].order, editData[p].st, editData[p].limit]);
        }
      });
      if (savePayload.length === 0) return alert("入力がありません");

      const url = `${GAS_URL}?method=saveOnly&orderNo=${encodeURIComponent(orderNo)}&createDate=${createDate}&allData=${encodeURIComponent(JSON.stringify(savePayload))}`;
      const res = await fetch(url);
      const result = await res.json();
      if (result === "保存成功") window.print();
      else alert(result);
    }
  </script>
</body>
</html>
