<script>
// --- バリデーション機能 (v6.93 修正版) ---

// 指示順の重複チェック（入力確定時）
function checkOrderDupe(el) {
  const val = el.value.trim();
  if (!val) { sync(); return; }
  
  let dupeProcName = "";
  // 全工程をループして、自分以外の工程で同じ「指示順」がないか探す
  Object.keys(editData).forEach(idx => {
    const i = parseInt(idx);
    if (i !== currentIdx && editData[i].order === val) {
      dupeProcName = editData[i].name;
    }
  });

  if (dupeProcName) {
    // ユーザー指定のメッセージ形式に修正
    alert(`指示順 [${val}] は「${dupeProcName}」と重複しています。修正してください。`);
    el.value = ""; // 不正な値を消去
    el.focus();    // 再入力を促す
    sync();        // プレビューを空に戻す
  } else {
    sync();
  }
}

// 納期の逆転チェック
function checkLimitSequence(el) {
  const newDate = el.value;
  if (!newDate) { sync(); return; }

  const curOrderStr = document.getElementById('inp-order').value;
  if (!curOrderStr) { sync(); autoNext(); return; }
  
  const curOrder = parseInt(curOrderStr);
  let errorMsg = "";

  Object.values(editData).forEach(d => {
    if (!d.order || !d.limit || d.name === editData[currentIdx].name) return;
    const otherOrder = parseInt(d.order);
    
    // 【禁則1】指示順が前なのに、納期が自分より遅い
    if (otherOrder < curOrder && d.limit > newDate) {
      errorMsg = `納期が「${d.name}」(順:${otherOrder}) より早くなっています。修正してください。`;
    }
    // 【禁則2】指示順が後なのに、納期が自分より早い
    if (otherOrder > curOrder && d.limit < newDate) {
      errorMsg = `納期が「${d.name}」(順:${otherOrder}) より遅くなっています。修正してください。`;
    }
  });

  if (errorMsg) {
    alert(errorMsg);
    el.value = ""; // 不正な値を消去
    el.focus();
    sync();
  } else {
    sync();
    autoNext(); // 正常な場合のみ次工程へ
  }
}
</script>
