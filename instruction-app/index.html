<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 10px; background: #e9ecef; }
    #order-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 50px; border-radius: 15px; text-align: center; }
    .modal-content input { font-size: 32px; padding: 10px; width: 350px; text-align: center; border: 3px solid #007bff; border-radius: 10px; }
    
    .top-bar { display: flex; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; }
    #display-order-no { font-size: 22px; font-weight: bold; color: #ffc107; cursor: pointer; text-decoration: underline; margin-left: 15px; }

    #preview-container { background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 15px; }
    .preview-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .order-no-title { font-size: 30px; font-weight: bold; }
    
    table.preview-table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 15px; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 10px; text-align: center; height: 35px; }
    .preview-table th { background: #f2f2f2; font-size: 9px; }
    #qr-area canvas { width: 85px !important; height: 85px !important; }

    #button-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
    .proc-btn { padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid #adb5bd; background: #fff; border-radius: 4px; }
    .proc-btn.active { background: #007bff; color: white; border-color: #0056b3; }

    .action-area { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; }
    #input-card { background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #007bff; width: 450px; }
    .card-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .nav-btn { font-size: 24px; cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
    .current-proc-title { font-size: 22px; font-weight: bold; color: #007bff; min-width: 140px; text-align: center; }

    .vertical-inputs { display: flex; flex-direction: column; gap: 12px; }
    .input-item { display: flex; align-items: center; width: 100%; }
    .input-item label { font-size: 14px; font-weight: bold; width: 80px; flex-shrink: 0; }
    .input-item input, .input-item select { font-size: 18px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
    
    /* 納期（カレンダー）のカスタマイズ */
    #inp-limit {
      position: relative;
      padding-left: 40px; /* アイコンを左に置くためのスペース */
      width: 160px;
    }
    /* Chrome/Edge/Safari用: カレンダーアイコンを左端に強制移動 */
    #inp-limit::-webkit-calendar-picker-indicator {
      position: absolute;
      left: 8px;
      cursor: pointer;
    }

    #extra-proc-select { border: 2px solid #ffc107; width: 240px; }
    .save-btn { padding: 20px 40px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; }
    
    @media print {
      .top-bar, #button-grid, .action-area, #order-modal, .nav-btn { display: none !important; }
      #preview-container { border: none; padding: 0; }
      @page { size: A4 landscape; margin: 10mm; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <strong>指示書 v6.1</strong>
  <span id="display-order-no" onclick="showModal()">---</span>
  <button id="archive-btn" onclick="runArchive()" style="margin-left: 20px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px;">完了案件を整理</button>
  <div style="margin-left: auto;">作成日: <span id="disp-date"></span></div>
</div>

  <div class="top-bar">
    <strong>指示書 v5.9</strong>
    <span id="display-order-no" onclick="showModal()">---</span>
    <div style="margin-left: auto;">作成日: <span id="disp-date"></span></div>
  </div>

  <div id="preview-container">
    <div class="preview-header">
      <div id="huge-no-display" class="order-no-title">手配No：--------</div>
      <div id="qr-area"><canvas id="qrcode"></canvas></div>
    </div>
    <table class="preview-table">
      <thead><tr id="thr-proc"><th>工程</th></tr></thead>
      <tbody>
        <tr id="tr-order"><th>指示順</th></tr>
        <tr id="tr-st"><th>ST</th></tr>
        <tr id="tr-limit"><th>納期</th></tr>
      </tbody>
    </table>
  </div>

  <div id="button-grid"></div>

  <div class="action-area">
    <div id="input-card">
      <div class="card-header">
        <div class="nav-btn" onclick="navProc(-1)">◁</div>
        <div id="current-proc-display" class="current-proc-title">未選択</div>
        <div id="next-btn-focus" class="nav-btn" onclick="navProc(1)" tabindex="0">▷</div>
      </div>
      
      <div class="vertical-inputs">
        <div id="extra-area" style="display:none;" class="input-item">
          <label>工程選択</label>
          <select id="extra-proc-select" onchange="handleExtraSelect()"></select>
        </div>
        <div class="input-item">
          <label>指示順</label>
          <input type="number" id="inp-order" disabled onkeydown="enterNext(event, 'inp-st')" onchange="checkDuplicate(this)" oninput="sync()">
        </div>
        <div class="input-item">
          <label>ST</label>
          <input type="number" id="inp-st" disabled onkeydown="enterNext(event, 'inp-limit')" oninput="sync()">
        </div>
        <div class="input-item">
          <label>納期</label>
          <input type="date" id="inp-limit" disabled 
                 onclick="this.showPicker()" 
                 onkeydown="enterNext(event, 'next-btn-focus')" 
                 oninput="sync()">
        </div>
      </div>
    </div>
    <button class="save-btn" id="save-focus" onclick="saveAndPrint()">保存 ＆ 指示書発行</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ8KW8Z8bPXIu-piVjydNI-na8gBygz1UVCrvGjFRdpJ-NPoj2fk14bzkv62AY4r8T/exec";
    let master = { processes: [] };
    let editData = {}; 
    let currentProcIdx = -1;

    document.getElementById('modal-order-no').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim();
        if (!val) return;
        document.getElementById('display-order-no').innerText = val;
        document.getElementById('huge-no-display').innerText = "手配No：" + val;
        document.getElementById('order-modal').style.display = 'none';
        try { QRCode.toCanvas(document.getElementById('qrcode'), val, { width: 85, margin: 2 }); } catch(err){}
      }
    });

    function showModal() { document.getElementById('order-modal').style.display = 'flex'; document.getElementById('modal-order-no').focus(); }

    window.onload = async () => {
      document.getElementById('disp-date').innerText = new Date().toLocaleDateString();
      const res = await fetch(`${GAS_URL}?method=getMasters`);
      master = await res.json();
      initUI();
    };

    function initUI() {
      const thr = document.getElementById('thr-proc');
      const trO = document.getElementById('tr-order');
      const trS = document.getElementById('tr-st');
      const trL = document.getElementById('tr-limit');
      const btnGrid = document.getElementById('button-grid');
      const extraSelect = document.getElementById('extra-proc-select');

      extraSelect.innerHTML = '<option value="">-- 正規工程を選択 --</option>';

      master.processes.forEach((proc, i) => {
        thr.innerHTML += `<th id="h-p-${i}">${proc}</th>`;
        trO.innerHTML += `<td id="d-o-${i}"></td>`;
        trS.innerHTML += `<td id="d-s-${i}"></td>`;
        trL.innerHTML += `<td id="d-l-${i}"></td>`;

        const btn = document.createElement('button');
        btn.className = 'proc-btn';
        btn.innerText = proc;
        btn.onclick = () => selectProc(i);
        btnGrid.appendChild(btn);
        
        // 完全に独立したデータ構造で初期化
        editData[i] = { name: proc, order: "", st: "", limit: "" };
        
        if(!proc.includes("予備")){
          const opt = document.createElement('option');
          opt.value = proc; opt.innerText = proc;
          extraSelect.appendChild(opt);
        }
      });
    }

    function selectProc(index) {
      if (index < 0 || index >= master.processes.length) return;
      currentProcIdx = index;
      
      const originalName = master.processes[index];
      const isExtra = originalName.includes("予備");
      
      document.getElementById('current-proc-display').innerText = originalName;
      document.getElementById('extra-area').style.display = isExtra ? "flex" : "none";
      
      document.querySelectorAll('.proc-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('button-grid').children[index].classList.add('active');

      // 重要：他の工程のデータが残らないよう、表示を一旦クリアして現在のデータをセット
      const data = editData[index];
      document.getElementById('inp-order').value = data.order;
      document.getElementById('inp-st').value = data.st;
      document.getElementById('inp-limit').value = data.limit;

      if (isExtra) {
        // 予備の場合、選択されている工程名をプルダウンに反映
        const savedName = data.name;
        document.getElementById('extra-proc-select').value = (savedName === originalName) ? "" : savedName;
        
        if (savedName !== originalName && savedName !== "") {
          unlockInputs();
        } else {
          lockInputs();
          document.getElementById('extra-proc-select').focus();
        }
      } else {
        unlockInputs();
      }
    }

    function unlockInputs() {
      ['inp-order', 'inp-st', 'inp-limit'].forEach(id => document.getElementById(id).disabled = false);
      document.getElementById('inp-order').focus();
    }

    function lockInputs() {
      ['inp-order', 'inp-st', 'inp-limit'].forEach(id => document.getElementById(id).disabled = true);
    }

    function handleExtraSelect() {
      const selectedName = document.getElementById('extra-proc-select').value;
      if (selectedName) {
        editData[currentProcIdx].name = selectedName;
        document.getElementById(`h-p-${currentProcIdx}`).innerText = selectedName;
        unlockInputs();
      }
    }

    function sync() {
      if (currentProcIdx === -1) return;
      const o = document.getElementById('inp-order').value;
      const s = document.getElementById('inp-st').value;
      const l = document.getElementById('inp-limit').value;
      
      editData[currentProcIdx].order = o;
      editData[currentProcIdx].st = s;
      editData[currentProcIdx].limit = l;

      document.getElementById(`d-o-${currentProcIdx}`).innerText = o;
      document.getElementById(`d-s-${currentProcIdx}`).innerText = s;
      document.getElementById(`d-l-${currentProcIdx}`).innerText = l ? l.split('-').slice(1).join('/') : "";
    }

    function checkDuplicate(inputEl) {
      const val = inputEl.value;
      if (!val) return;
      for (let key in editData) {
        if (parseInt(key) !== currentProcIdx && editData[key].order === val) {
          alert(`指示順 ${val} は既に「${editData[key].name}」で使用されています。`);
          inputEl.value = "";
          sync();
          return;
        }
      }
    }

    function navProc(diff) {
      let next = currentProcIdx + diff;
      if (next >= 0 && next < master.processes.length) selectProc(next);
    }

    function enterNext(e, nextId) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const nextEl = document.getElementById(nextId);
        if (nextEl) nextEl.focus();
      }
    }

    async function saveAndPrint() {
      const orderNo = document.getElementById('display-order-no').innerText;
      const createDate = new Date().toISOString().split('T')[0];
      let savePayload = [];
      Object.keys(editData).forEach(idx => {
        const d = editData[idx];
        if (d.order || d.st || d.limit) savePayload.push([d.name, d.order, d.st, d.limit]);
      });
      if (savePayload.length === 0) return alert("入力がありません");
      const url = `${GAS_URL}?method=saveOnly&orderNo=${encodeURIComponent(orderNo)}&createDate=${createDate}&allData=${encodeURIComponent(JSON.stringify(savePayload))}`;
      const res = await fetch(url);
      const result = await res.json();
      if (result === "保存成功") window.print(); else alert(result);
    }
    
    async function runArchive() {
  const btn = document.getElementById('archive-btn');
  const originalText = btn.innerText;
  
  if (!confirm("完了した案件をアーカイブシートへ移動しますか？")) return;
  
  btn.innerText = "処理中...";
  btn.disabled = true;
  
  google.script.run.withSuccessHandler(res => {
    alert(res);
    btn.innerText = originalText;
    btn.disabled = false;
    // 画面をリロードして最新状態にする
    location.reload();
  }).withFailureHandler(err => {
    alert("エラーが発生しました: " + err);
    btn.innerText = originalText;
    btn.disabled = false;
  }).checkAndArchiveCompletedOrders();
}
  </script>
</body>
</html>
