<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 10px; background: #e9ecef; }
    #order-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 50px; border-radius: 15px; text-align: center; }
    .modal-content input { font-size: 32px; padding: 10px; width: 350px; text-align: center; border: 3px solid #007bff; border-radius: 10px; }
    .top-bar { display: flex; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; }
    #display-order-no { font-size: 22px; font-weight: bold; color: #ffc107; cursor: pointer; text-decoration: underline; margin-left: 15px; }
    #preview-container { background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 15px; }
    .preview-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .order-no-title { font-size: 36px; font-weight: bold; font-family: sans-serif; line-height: 1; }
    table.preview-table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 15px; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 10px; text-align: center; height: 35px; }
    .preview-table th { background: #f2f2f2; font-size: 9px; }
    #qr-area canvas { width: 85px !important; height: 85px !important; }
    #button-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
    .proc-btn { padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid #adb5bd; background: #fff; border-radius: 4px; }
    .proc-btn.active { background: #007bff; color: white; border-color: #0056b3; }
    .action-area { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; }
    #input-card { background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #007bff; width: 480px; }
    .card-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .nav-btn { font-size: 24px; cursor: pointer; background: #f8f9fa; border: 1px solid #ccc; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; outline: none; }
    .nav-btn:focus { border: 2px solid #007bff; }
    .current-proc-title { font-size: 24px; font-weight: bold; color: #007bff; min-width: 150px; text-align: center; }
    .vertical-inputs { display: flex; flex-direction: column; gap: 12px; }
    .input-item { display: flex; align-items: center; }
    .input-item label { font-size: 14px; font-weight: bold; width: 80px; text-align: left; }
    .input-item input, .input-item select { font-size: 18px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 220px; }
    #extra-proc-select { height: 45px; margin-bottom: 5px; border: 2px solid #ffc107; }
    .save-btn { padding: 20px 40px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; }
    @media print { .top-bar, #button-grid, .action-area, #order-modal, .nav-btn { display: none !important; } #preview-container { border: none; padding: 0; } @page { size: A4 landscape; margin: 10mm; } }
  </style>
</head>
<body>
  <div id="order-modal"><div class="modal-content"><h1>手配Noを入力</h1><input type="text" id="modal-order-no" autofocus></div></div>
  <div class="top-bar"><strong>指示書 v5.6</strong><span id="display-order-no" onclick="showModal()">---</span><div style="margin-left: auto;">作成日: <span id="disp-date"></span></div></div>
  <div id="preview-container">
    <div class="preview-header"><div id="huge-no-display" class="order-no-title">手配No：--------</div><div id="qr-area"><canvas id="qrcode"></canvas></div></div>
    <table class="preview-table"><thead><tr id="thr-proc"><th>工程</th></tr></thead><tbody><tr id="tr-order"><th>指示順</th></tr><tr id="tr-st"><th>ST</th></tr><tr id="tr-limit"><th>納期</th></tr></tbody></table>
  </div>
  <div id="button-grid"></div>
  <div class="action-area">
    <div id="input-card">
      <div class="card-header"><div class="nav-btn" onclick="navProc(-1)">◁</div><div id="current-proc-display" class="current-proc-title">未選択</div><div id="next-btn-focus" class="nav-btn" onclick="navProc(1)" tabindex="0">▷</div></div>
      <div class="vertical-inputs">
        <div id="extra-area" style="display:none;" class="input-item"><label>工程名</label><select id="extra-proc-select" onchange="handleExtraSelect()"></select></div>
        <div class="input-item"><label>指示順</label><input type="number" id="inp-order" disabled onkeydown="enterNext(event, 'inp-st')" onchange="checkDuplicate(this)" oninput="sync()"></div>
        <div class="input-item"><label>標準時間</label><input type="number" id="inp-st" disabled onkeydown="enterNext(event, 'inp-limit')" oninput="sync()"></div>
        <div class="input-item"><label>納期</label><input type="date" id="inp-limit" disabled onkeydown="enterNext(event, 'next-btn-focus')" oninput="sync()"></div>
      </div>
    </div>
    <button class="save-btn" id="save-focus" onclick="saveAndPrint()">保存 ＆ 指示書発行</button>
  </div>
  <script>

    let master = { processes: [] }; let editData = {}; let currentProcIdx = -1;

      const val = modalInput.value; document.getElementById('display-order-no').innerText = val; document.getElementById('huge-no-display').innerText = "手配No：" + val;
      document.getElementById('order-modal').style.display = 'none'; QRCode.toCanvas(document.getElementById('qrcode'), val, { width: 85, margin: 2 });
