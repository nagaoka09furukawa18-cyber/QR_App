<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; background: #e9ecef; }
    #debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; margin-bottom: 10px; height: 100px; overflow-y: auto; }
    .top-bar { background: #343a40; color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
    #preview-container { background: white; padding: 20px; border: 1px solid #ccc; margin-bottom: 15px; overflow-x: auto; }
    #main-order-no { font-size: 28px; font-weight: bold; border: 2px solid #007bff; background: #fffde7; padding: 5px; width: 300px; }
    table.preview-table { border-collapse: collapse; width: 100%; min-width: 1000px; }
    .preview-table th, .preview-table td { border: 1px solid #000; font-size: 11px; text-align: center; height: 35px; }
    #main-controls { background: white; padding: 15px; border-top: 5px solid #007bff; }
    .proc-btn { padding: 10px; margin: 2px; cursor: pointer; border: 1px solid #ccc; background: #fff; font-weight: bold; }
    .proc-btn.active { background: #007bff; color: white; }
    .save-btn { padding: 15px 30px; background: #28a745; color: white; border: none; font-size: 20px; cursor: pointer; }
    @media print { .top-bar, #main-controls, #debug-log { display: none !important; } }
    /* ◁ ▷ 用の追加スタイル */
    .nav-btn { padding: 5px 15px; font-size: 20px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; }
    .nav-btn:hover { background: #e0e0e0; }
  </style>
</head>
<body>

<div id="debug-log"><div>[System Log v6.78]</div></div>

<div class="top-bar">
  <strong>指示書作成コックピット v6.78</strong>
  <div id="status-display">Initializing...</div>
</div>

<div id="preview-container">
  <div style="margin-bottom:10px;">手配No : <input type="text" id="main-order-no"></div>
  <table class="preview-table">
    <thead id="thr-proc"><tr id="tr-head"><th style="width:80px;">工程</th></tr></thead>
    <tr id="tr-order"><th>指示順</th></tr>
    <tr id="tr-st"><th>ST</th></tr>
    <tr id="tr-limit"><th>納期</th></tr>
  </table>
</div>

<div id="main-controls">
  <div id="button-grid"></div>
  <div style="display:flex; justify-content:space-between; margin-top:15px;">
    <div style="border:1px solid #007bff; padding:15px; border-radius:5px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <button type="button" class="nav-btn" onclick="moveProc(-1)">◁</button>
        <div id="target-proc-name" style="font-weight:bold; color:#007bff; font-size:18px; min-width:80px; text-align:center;">工程選択</div>
        <button type="button" class="nav-btn" onclick="moveProc(1)">▷</button>
      </div>
      
      指示順: <input type="number" id="inp-order" oninput="sync()" onkeydown="handleEnter(event, 'inp-st')"><br>
      ST: <input type="number" id="inp-st" oninput="sync()" onkeydown="handleEnter(event, 'inp-limit')"><br>
      納期: <input type="date" id="inp-limit" oninput="sync()" onclick="this.showPicker()">
    </div>
    <button class="save-btn" onclick="saveAndPrint()">保存 ＆ 印刷</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ8KW8Z8bPXIu-piVjydNI-na8gBygz1UVCrvGjFRdpJ-NPoj2fk14bzkv62AY4r8T/exec";
let editData = {};
let master = { existingNos: {} };
let masterProcs = []; // M_工程から取得したリスト
let currentIdx = 0;

function log(m) { document.getElementById('debug-log').innerHTML += `<div>> ${m}</div>`; }

window.onload = async () => {
  await fetchMaster();
};

async function fetchMaster() {
  log("最新の情報を取得中...");
  try {
    const res = await fetch(`${GAS_URL}?method=getMasters`);
    const data = await res.json();
    master.existingNos = data.existingNos || {};
    masterProcs = data.processes || []; // ここで「M_工程」をセット
    
    initUI(); // UI構築（表のヘッダーなど）
    updateCockpit(); // 最初の工程を表示
    
    log(`同期完了: ${Object.keys(master.existingNos).length}件の手配No / ${masterProcs.length}工程を認識`);
    document.getElementById('status-display').innerText = "Ready";
  } catch (e) { log("初期ロード失敗: " + e); }
}

function initUI() {
  const trH = document.getElementById('tr-head');
  const trO = document.getElementById('tr-order');
  const trS = document.getElementById('tr-st');
  const trL = document.getElementById('tr-limit');

  // 初期化（「工程」などの見出し以外をクリア）
  trH.innerHTML = '<th style="width:80px;">工程</th>';
  trO.innerHTML = '<th>指示順</th>';
  trS.innerHTML = '<th>ST</th>';
  trL.innerHTML = '<th>納期</th>';

  masterProcs.forEach((proc, i) => {
    trH.innerHTML += `<th>${proc}</th>`;
    trO.innerHTML += `<td id="d-o-${i}"></td>`;
    trS.innerHTML += `<td id="d-s-${i}"></td>`;
    trL.innerHTML += `<td id="d-l-${i}"></td>`;
    editData[i] = { name: proc, order: "", st: "", limit: "" };
  });
}

function moveProc(step) {
  if (masterProcs.length === 0) return;
  currentIdx = (currentIdx + step + masterProcs.length) % masterProcs.length;
  updateCockpit();
}

function updateCockpit() {
  if (masterProcs.length === 0) return;
  const procName = masterProcs[currentIdx];
  document.getElementById('target-proc-name').innerText = procName;
  
  const d = editData[currentIdx];
  document.getElementById('inp-order').value = d.order;
  document.getElementById('inp-st').value = d.st;
  document.getElementById('inp-limit').value = d.limit;
}

function handleEnter(e, nextId) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById(nextId).focus();
    if (nextId === 'inp-limit') document.getElementById(nextId).showPicker();
  }
}

function sync() {
  if (masterProcs.length === 0) return;
  const d = editData[currentIdx];
  d.order = document.getElementById('inp-order').value;
  d.st = document.getElementById('inp-st').value;
  d.limit = document.getElementById('inp-limit').value;
  updatePreviewCell(currentIdx);
}

function updatePreviewCell(idx) {
  const d = editData[idx];
  document.getElementById(`d-o-${idx}`).innerText = d.order;
  document.getElementById(`d-s-${idx}`).innerText = d.st;
  document.getElementById(`d-l-${idx}`).innerText = d.limit ? d.limit.split('-').slice(1).join('/') : "";
}

document.getElementById('main-order-no').addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (!val) return;
    clearPreview();
    const rangeInfo = master.existingNos[val];
    if (rangeInfo) {
      log(`手配No [${val}] を発見。`);
      try {
        const res = await fetch(`${GAS_URL}?method=getExistingOrder&range=${JSON.stringify(rangeInfo)}`);
        const rows = await res.json();
        rows.forEach(row => {
          const idx = masterProcs.indexOf(row[0]);
          if (idx !== -1) {
            editData[idx] = { name: row[0], order: row[1], st: row[2], limit: row[3] ? row[3].split('T')[0] : "" };
            updatePreviewCell(idx);
          }
        });
        updateCockpit();
        log("反映完了。");
      } catch (err) { log("データ取得失敗"); }
    } else {
      log("新規手配Noです。");
    }
  }
});

function clearPreview() {
  masterProcs.forEach((p, i) => {
    editData[i] = { name: p, order: "", st: "", limit: "" };
    document.getElementById(`d-o-${i}`).innerText = "";
    document.getElementById(`d-s-${i}`).innerText = "";
    document.getElementById(`d-l-${i}`).innerText = "";
  });
}

async function saveAndPrint() {
  const orderNo = document.getElementById('main-order-no').value.trim();
  if (!orderNo) return alert("手配No未入力");
  let payload = [];
  masterProcs.forEach((name, i) => {
    const d = editData[i];
    if (d.order || d.st || d.limit) payload.push([name, d.order, d.st, d.limit]);
  });
  log("保存中...");
  try {
    const url = `${GAS_URL}?method=saveOnly&orderNo=${encodeURIComponent(orderNo)}&allData=${encodeURIComponent(JSON.stringify(payload))}`;
    const res = await fetch(url);
    const result = await res.json();
    if (result.status === "保存成功") {
      master.existingNos = result.newIndex;
      log("保存成功。最新の地図を同期しました。");
      window.print();
    }
  } catch(e) { log("通信エラー"); }
}
</script>
</body>
</html>
