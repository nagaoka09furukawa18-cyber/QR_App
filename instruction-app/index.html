<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    /* CSSは以前のものをそのまま使えます */
    body { font-family: sans-serif; padding: 20px; color: #333; margin-top: 50px; }
    .header-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
    #orderNo { font-size: 28px; padding: 5px 10px; width: 300px; font-weight: bold; border: 2px solid #007bff; border-radius: 4px; }
    #qr-canvas { width: 200px !important; height: 200px !important; border: 1px solid #ccc; background: #fff; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th { background: #444; color: white; padding: 10px; border: 1px solid #ccc; }
    td { border: 1px solid #ccc; height: 40px; }
    input.data-input { width: 100%; height: 100%; border: none; padding: 0 8px; box-sizing: border-box; font-size: 16px; }
    .save-btn { margin-top: 30px; padding: 15px 50px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="main-ui">
    <h2>指示書入力 v4.1.0 (GitHub版)</h2>
    <div class="header-area">
      <div>
        <label>手配No (入力でQR生成):</label><br>
        <input type="text" id="orderNo" oninput="updateQR()" placeholder="例: BBB">
        <div style="margin-top:15px;"><label>作成日:</label><br><input type="date" id="createDate" style="font-size: 18px;"></div>
      </div>
      <div id="qr-section">
        <canvas id="qr-canvas"></canvas>
        <div id="url-display"></div>
      </div>
    </div>
    <div id="table-container">読み込み中...</div>
    <button id="saveBtn" class="save-btn" onclick="processAll()" style="display:none;">指示書発行 (保存＆印刷)</button>
  </div>

  <script>
    // ★ここにあなたのGASのWebアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/ここにID/exec";

    window.onload = () => {
      document.getElementById('createDate').valueAsDate = new Date();
      
      // GASからマスターデータを取得
      fetch(`${GAS_URL}?method=getMasters`)
        .then(response => response.json())
        .then(data => {
          drawTable(data);
          document.getElementById('saveBtn').style.display = 'block';
        })
        .catch(err => console.error("データ取得エラー:", err));
    };

    function updateQR() {
      const orderNo = document.getElementById('orderNo').value;
      const canvas = document.getElementById('qr-canvas');
      if (!orderNo) return;
      QRCode.toCanvas(canvas, orderNo, { width: 200, margin: 2 });
    }

function drawTable(data) {
  let html = '<table><thead><tr><th>工程</th>';
  html += data.inputs.map(i => `<th>${i}</th>`).join('') + '</tr></thead><tbody>';

  data.processes.forEach((proc, r) => {
    html += '<tr>';
    
    // --- 工程名セルの制御 ---
    if (proc === "予備") {
      // 「予備」行の場合は、プルダウンを作成
      let options = data.processes
        .filter(p => p !== "予備") // 選択肢から「予備」を除外
        .map(p => `<option value="${p}">${p}</option>`).join('');
      
      html += `<td class="proc-name">
                <select class="proc-select" data-row="${r}">
                  <option value="">(選択)</option>
                  ${options}
                </select>
               </td>`;
    } else {
      // 通常の工程はそのまま表示
      html += `<td class="proc-name" data-proc="${proc}">${proc}</td>`;
    }

    // --- 入力項目の制御（指示順、ST、納期） ---
    data.inputs.forEach((inputName, c) => {
      let type = "text";
      if (inputName === "指示順" || inputName === "ST") type = "number";
      else if (inputName === "納期") type = "date";

      html += `<td><input type="${type}" class="data-input" data-row="${r}" data-col="${c}"></td>`;
    });
    html += '</tr>';
  });
  
  document.getElementById('table-container').innerHTML = html + '</tbody></table>';
}

// processAll（HTML側）でデータを送る際、工程名も一緒に送るようにします
function processAll() {
  const rows = document.querySelectorAll('tbody tr');
  let allData = [];
  
  rows.forEach((row, i) => {
    let rowValues = {};
    // 工程名の取得（通常テキストか、プルダウンか）
    let select = row.querySelector('.proc-select');
    rowValues.procName = select ? select.value : row.cells[0].innerText;
    
    // 入力値の取得 [指示順, ST, 納期]
    rowValues.inputs = Array.from(row.querySelectorAll('.data-input')).map(input => input.value);
    
    // 工程名が選択されている、または入力がある場合のみ追加
    if (rowValues.procName && (rowValues.inputs[0] || rowValues.inputs[1] || rowValues.inputs[2])) {
      allData.push(rowValues);
    }
  });

  // GASへ送信
  // ... fetch処理 ...
}
  </script>
</body>
</html>
